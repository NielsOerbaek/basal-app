{% extends 'core/base.html' %}

{% block title %}Brugermanual{% endblock %}

{% block extra_css %}
<style>
    .manual {
        max-width: 880px;
        margin: 0 auto;
        line-height: 1.8;
    }
    .manual h1 {
        color: var(--basal-purple);
        border-bottom: 2px solid var(--basal-purple);
        padding-bottom: 0.5rem;
        margin-top: 5rem;
        margin-bottom: 1.5rem;
        font-size: 1.9rem;
    }
    .manual h1:first-of-type { margin-top: 0; }
    .manual h2 {
        color: var(--basal-purple);
        margin-top: 3rem;
        margin-bottom: 1rem;
        font-size: 1.35rem;
    }
    .manual p { margin-bottom: 1.2rem; }
    .manual ol, .manual ul { margin-bottom: 1.5rem; }
    .manual li { margin-bottom: 0.5rem; }
    .manual img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 1rem auto;
        border: 1px solid #e6e0e5;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .manual blockquote {
        border-left: 3px solid var(--basal-purple);
        background: #faf6f9;
        padding: 0.4rem 1rem;
        margin: 1rem 0;
        color: #666;
    }
    .manual code {
        background: #f4eef3;
        color: var(--basal-purple);
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 0.92em;
    }
    .manual .toc {
        background: #faf6f9;
        border: 1px solid #e6e0e5;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        margin-bottom: 2rem;
    }
    .manual .toc .toctitle {
        font-weight: bold;
        color: var(--basal-purple);
        margin-bottom: 0.5rem;
        font-size: 1.1rem;
    }
    .manual .toc ul { list-style: none; padding-left: 0.5rem; margin: 0; }
    .manual .toc ul ul { padding-left: 1.2rem; }
    .manual .toc li { margin-bottom: 0.2rem; }
    .manual .toc a { color: var(--basal-text); text-decoration: none; }
    .manual .toc a:hover { color: var(--basal-purple); }
    .manual h1, .manual h2 { scroll-margin-top: 80px; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-book me-2"></i>Brugermanual</h1>
</div>

{% if manual %}
<div class="card">
    <div class="card-body manual">
        {{ manual }}
    </div>
</div>
{% else %}
<div class="alert alert-warning">Brugermanualen blev ikke fundet.</div>
{% endif %}
{% endblock %}
